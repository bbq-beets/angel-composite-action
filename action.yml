name: "Auto-Merge Protect Apps"
description: "Automatically merges Retool protect app PRs that only add the three required files"
author: "Drata"

branding:
  icon: "git-merge"
  color: "green"

inputs:
  gh-token:
    description: "GitHub token for API access and merging PRs"
    required: true
  repo:
    description: "Repository in the format owner/repo"
    required: true
  pr:
    description: "Pull request number to check and potentially merge"
    required: true

outputs:
  is-protect-app-pr:
    description: "Whether the PR is a valid protect app PR"
    value: ${{ steps.check.outputs.is_protect_app }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ inputs.gh-token }}

    - name: Check if PR is a protect app PR
      id: check
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.gh-token }}
        script: |
          const [owner, repoName] = '${{ inputs.repo }}'.split('/');
          const pull_number = ${{ inputs.pr }};

          const { data: files } = await github.rest.pulls.listFiles({
            owner,
            repo: repoName,
            pull_number,
          });

          console.log(`PR #${pull_number} has ${files.length} file(s) changed`);

          // Exactly 3 files are changed
          if (files.length !== 3) {
            console.log(`❌ Expected 3 files, found ${files.length}`);
            core.setOutput('is_protect_app', 'false');
            return;
          }

          // All files are additions (new files)
          const allAdditions = files.every(file => file.status === 'added');
          if (!allAdditions) {
            console.log('❌ Not all files are new additions');
            core.setOutput('is_protect_app', 'false');
            return;
          }

          // Extract directory for each file (everything before the filename)
          const fileDirs = files.map(f => {
            const parts = f.filename.split('/');
            parts.pop(); // Remove filename
            return parts.join('/');
          });

          // Check all files start with 'apps/'
          if (fileDirs.some(dir => !dir.startsWith('apps/'))) {
            console.log('❌ Not all files are in apps/ directory');
            core.setOutput('is_protect_app', 'false');
            return;
          }

          // Check all files have the expected filenames
          const fileNames = files.map(f => f.filename.split('/').pop());
          const expectedFiles = ['main.rsx', 'metadata.json', 'page1.rsx'];

          // Check we have exactly 3 files and all are in the expected set
          const allExpected = fileNames.every(name => expectedFiles.includes(name));
          const allPresent = expectedFiles.every(name => fileNames.includes(name));

          if (!allExpected || !allPresent) {
            console.log('❌ Files do not match expected set');
            console.log('Expected:', expectedFiles);
            console.log('Found:', fileNames);
            core.setOutput('is_protect_app', 'false');
            return;
          }

          // Find the shortest directory path (the base app directory)
          const sortedDirs = [...fileDirs].sort((a, b) => a.length - b.length);
          const baseDir = sortedDirs[0];

          // All directories must be the base or subdirectories of it
          const allInSameApp = fileDirs.every(dir => dir === baseDir || dir.startsWith(baseDir + '/'));

          if (!allInSameApp) {
            console.log('❌ Files are not in the same app directory');
            console.log('Directories found:', fileDirs);
            core.setOutput('is_protect_app', 'false');
            return;
          }

          console.log(`✅ PR is a valid protect app PR for app: ${baseDir}`);
          core.setOutput('is_protect_app', 'true');

    - name: Check auth identity
      if: steps.check.outputs.is_protect_app == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        GITHUB_TOKEN: ${{ inputs.gh-token }}
      run: |
        echo "Checking authentication identity..."
        INPUT_TOKEN="${{ inputs.gh-token }}"
        echo "inputs: ${INPUT_TOKEN:0:10}..."
        echo "Token prefix: ${GH_TOKEN:0:10}..."
        echo "Token length: ${#GH_TOKEN}"
        gh auth status
        echo "Fetching authenticated user..."
        gh api user --jq '.login'

    - name: Merge PR
      if: steps.check.outputs.is_protect_app == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        GITHUB_TOKEN: ${{ inputs.gh-token }}
      run: |
        gh pr merge ${{ inputs.pr }} --squash --auto

    - name: Skip auto-merge
      if: steps.check.outputs.is_protect_app != 'true'
      shell: bash
      run: |
        echo "ℹ️ PR does not meet criteria for auto-merge. Skipping."
