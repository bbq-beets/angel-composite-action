name: "Test GH Token"
description: "Test if GitHub token is passed correctly"

inputs:
  gh-token:
    description: "GitHub token to test"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check token auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        echo "Token length: ${#GH_TOKEN}"
        echo "Token prefix: ${GH_TOKEN:0:10}..."
        echo "---"
        gh auth status
        echo "---"
        echo "Authenticated as:"
        gh api user --jq '.login'
