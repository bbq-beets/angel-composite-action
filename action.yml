name: "Test GH Token"
description: "Test if GitHub token is passed correctly"

inputs:
  gh-token:
    description: "GitHub token to test"
    required: true

runs:
  using: "composite"
  steps:
    - name: Print token
      shell: bash
      run: |
        echo "${{ inputs.gh-token }}"

    - name: Verify token value
      shell: bash
      run: |
        if [ "${{ inputs.gh-token }}" = "angel" ]; then
          echo "✅ Token matches 'angel'"
        else
          echo "❌ Token does NOT match 'angel'"
          echo "Token length: ${#TOKEN}"
        fi
      env:
        TOKEN: ${{ inputs.gh-token }}
